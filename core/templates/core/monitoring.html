{% extends "core/base.html" %}
{% load json_script %}
{% block title %}Monitoring — WasteMap AI{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 fw-bold mb-0">
    Live Monitoring
    <span id="statusBadge" class="badge bg-secondary ms-2">Ready</span>
  </h1>
</div>

<div class="row g-3">
  <!-- Camera feed -->
  <div class="col-md-7">
    <div class="card chart-card">
      <div class="card-header fw-semibold bg-white border-0 pt-3 d-flex align-items-center gap-2">
        📷 Camera Feed
        <div class="ms-auto d-flex gap-2">
          <button id="startBtn" class="btn btn-success btn-sm">▶ Start</button>
          <button id="stopBtn" class="btn btn-danger btn-sm" disabled>⏹ Stop</button>
        </div>
      </div>
      <div class="card-body p-2">
        <div class="position-relative">
          <video id="videoEl" autoplay playsinline muted class="w-100 rounded" style="background:#111;min-height:360px;object-fit:cover;"></video>
          <canvas id="overlayCanvas" class="position-absolute top-0 start-0 w-100 h-100" style="pointer-events:none;"></canvas>
          <div id="classOverlay"></div>
        </div>
      </div>
      <div class="card-footer bg-white border-0 pb-3">
        <div class="row g-2">
          <div class="col-6">
            <label class="form-label small fw-semibold mb-1">Section</label>
            <select id="sectionSelect" class="form-select form-select-sm">
              <option value="">— Select Section —</option>
              {% for section in sections %}
              <option value="{{ section.pk }}">{{ section.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-6">
            <label class="form-label small fw-semibold mb-1">Subsection</label>
            <select id="subsectionSelect" class="form-select form-select-sm">
              <option value="">— Select Subsection —</option>
              {% for sub in subsections %}
              <option value="{{ sub.pk }}" data-section="{{ sub.section_id }}">{{ sub.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Live feed -->
  <div class="col-md-5">
    <div class="card chart-card h-100">
      <div class="card-header fw-semibold bg-white border-0 pt-3">
        📋 Live Feed
        <span class="badge bg-light text-dark ms-1 small" id="feedCount">0 items</span>
      </div>
      <div class="card-body p-2">
        <ul id="liveFeed" class="list-group overflow-auto" style="max-height:520px;">
          <li class="list-group-item text-muted text-center small py-3">Start monitoring to see live classifications</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<!-- Pass Django data to JavaScript -->
<script id="sectionsData" type="application/json">
  [{% for section in sections %}{"id": {{ section.pk }}, "name": "{{ section.name }}"}{% if not forloop.last %},{% endif %}{% endfor %}]
</script>
<script id="subsectionsData" type="application/json">
  [{% for sub in subsections %}{"id": {{ sub.pk }}, "name": "{{ sub.name }}", "section_id": {{ sub.section_id }}}{% if not forloop.last %},{% endif %}{% endfor %}]
</script>
{% endblock %}

{% block extra_js %}
<script src="/static/js/monitoring.js"></script>
{% endblock %}
