<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — WasteMap AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card card p-4 mx-3">
    <div class="text-center mb-4">
      <h2 class="fw-bold">🗺️ WasteMap AI</h2>
      <p class="text-muted mb-0">Waste Classification &amp; Monitoring System</p>
    </div>

    {% if error %}
    <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login/">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_username" class="form-label fw-semibold">Username</label>
        {{ form.username }}
        {% if form.username.errors %}
          <div class="text-danger small mt-1">{{ form.username.errors.0 }}</div>
        {% endif %}
      </div>
      <div class="mb-4">
        <label for="id_password" class="form-label fw-semibold">Password</label>
        {{ form.password }}
        {% if form.password.errors %}
          <div class="text-danger small mt-1">{{ form.password.errors.0 }}</div>
        {% endif %}
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
